name: Run Jupyter Notebook (sunset)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pipeline-sunset:
    runs-on: ubuntu-latest

    steps:
      - name: Explain sunset status
        run: |
          echo "The daily ZimStock notebook pipeline has been sunset."
          echo "ZSE and VFEX price-sheet endpoints are returning HTTP 404, and the exchanges now charge for this data."
          echo "This non-profit research project is being preserved as an archive rather than continuing as an active collection pipeline."
          echo "See README.md for the current data status."
